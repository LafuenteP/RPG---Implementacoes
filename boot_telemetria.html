            margin-left: 5px;

<body>
    <div id="boot-screen"></div>

    <script>
        // O jogador curioso também vai achar coisas no F12 (DevTools)
        console.log("%c[ ERRO DO SISTEMA V-04 ]", "color: red; font-size: 24px; font-weight: bold;");
        console.log("%cA interface gráfica queimou. Mas se você está lendo isso, você sabe investigar.", "color: green; font-size: 16px;");
        console.log("%cUse um conversor Base64 para descriptografar o link no código fonte HTML.", "color: yellow; font-size: 14px;");

        const bootSequence = [
            "INICIALIZANDO MÓDULOS DO NÚCLEO PANACEIA...",
            "CARREGANDO BANCOS DE MEMÓRIA.......... [OK]",
            "MONTANDO SISTEMA DE ARQUIVOS.......... [OK]",
            "VERIFICANDO SENSOR DE TELEMETRIA V-04. [OK]",
            "ESTABELECENDO LINK DE REDE PANACEIA... [OK]",
            "CARREGANDO RENDERIZADOR GRÁFICO....... ",
            "<span class='error-text'>[ERRO FATAL] MÓDULO GUI CORROMPIDO.</span>",
            "<span class='error-text'>[ERRO FATAL] INCOMPATIBILIDADE DE CHECKSUM EM 0x00F8A9.</span>",
            "TENTANDO REINICIAR O RENDERIZADOR.",
            ".",
            "..",
            "...",
            "<span class='error-text'>[!] RENDERIZADOR DESTRUÍDO. SISTEMA INTERROMPIDO.</span>",
            "<br>",
            "PROTOCOLO DE CONTINGÊNCIA PANACEIA ATIVADO.",
            "TRANSMITINDO SINAL DE TELEMETRIA PARA GATEWAY EXTERNO.",
            "AGUARDANDO ROTEAMENTO MANUAL..."
        ];

        const screen = document.getElementById('boot-screen');
        let index = 0;

        function addLine() {
            if (index < bootSequence.length) {
                screen.innerHTML = screen.innerHTML.replace('<div class="cursor"></div>', '');
                screen.innerHTML += bootSequence[index] + "<br>";
                screen.innerHTML += '<div class="cursor"></div>';
                index++;
                
                let delay = Math.random() * 500 + 100;
                if(bootSequence[index-1] === "." || bootSequence[index-1] === ".." || bootSequence[index-1] === "...") {
                    delay = 1000;
                }
                setTimeout(addLine, delay);
            }
        }

        // Inicia o texto de boot automaticamente
        setTimeout(addLine, 1000);
    </script>
