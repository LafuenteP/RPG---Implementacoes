<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLE DO MESTRE [PUZZLE V-04]</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .panel {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 { margin-top: 0; color: #ffaa00; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-reset { background: #3498db; color: white; }
        .btn-reset:hover { background: #2980b9; }
        
        .btn-death { background: #e74c3c; color: white; }
        .btn-death:hover { background: #c0392b; }
        
        .btn-success { background: #2ecc71; color: white; }
        .btn-success:hover { background: #27ae60; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>Painel do Mestre (V-04)</h1>
        <p>Controles remotos para o puzzle de gases.</p>
        
        <button class="btn btn-reset" id="btn-reset">Reiniciar Puzzle (8 Min)</button>
        <button class="btn btn-death" id="btn-kill">Forçar Falha Crítica (Matar)</button>
        <button class="btn btn-success" id="btn-win">Forçar Sucesso (Liberar)</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="master-v04.js"></script>
</body>
</html>
